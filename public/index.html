<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamForge Interface</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="background-gradient"></div>
    <main class="container">
      <header>
        <h1 class="gradient-text">StreamForge</h1>
        <p class="subtitle">Event Tracking Interface</p>
      </header>

      <section class="dashboard-grid">
        <div class="stat-card glass-effect">
          <div class="stat-icon">
            <svg
              width="24"
              height="24"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"
              ></path>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-label">Total Events</div>
            <div class="stat-value" id="totalEventsCount">0</div>
          </div>
        </div>
        <div class="stat-card glass-effect">
          <div class="stat-icon" style="color: var(--success-color)">
            <svg
              width="24"
              height="24"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-label">Total Volume</div>
            <div class="stat-value" id="totalVolumeAmount">$0.00</div>
          </div>
        </div>
      </section>

      <section class="card glass-effect">
        <h2 id="formTitle">Create New Event</h2>
        <form id="eventForm">
          <input type="hidden" id="eventId" />
          <div class="form-group">
            <label for="userId">User ID</label>
            <input
              type="number"
              id="userId"
              name="userId"
              required
              placeholder="e.g. 101"
            />
          </div>
          <div class="form-group">
            <label for="amount">Amount</label>
            <input
              type="number"
              step="0.01"
              id="amount"
              name="amount"
              required
              placeholder="e.g. 45.99"
            />
          </div>
          <div class="form-group">
            <label for="eventType">Event Type</label>
            <input
              type="text"
              id="eventType"
              name="eventType"
              required
              placeholder="e.g. purchase"
            />
          </div>
          <div
            class="form-actions"
            style="display: flex; gap: 1rem; align-items: center"
          >
            <button
              type="submit"
              id="submitBtn"
              class="btn primary-btn"
              style="margin-top: 0"
            >
              <span>Submit Event</span>
            </button>
            <button
              type="button"
              id="cancelEditBtn"
              class="btn secondary-btn hidden"
            >
              Cancel Edit
            </button>
          </div>
        </form>
        <div id="formMessage" class="message hidden"></div>
      </section>

      <section class="events-section">
        <div class="events-header">
          <h2>Recent Events</h2>
          <div
            class="header-actions"
            style="display: flex; gap: 1rem; align-items: center"
          >
            <input
              type="text"
              id="filterEventType"
              placeholder="Filter by Type"
              class="filter-input"
              style="
                padding: 0.5rem;
                max-width: 150px;
                border-radius: 4px;
                border: 1px solid var(--border-color);
                background: rgba(13, 17, 23, 0.8);
                color: var(--text-primary);
              "
            />
            <input
              type="number"
              id="filterUserId"
              placeholder="Filter by User ID"
              class="filter-input"
              style="
                padding: 0.5rem;
                max-width: 150px;
                border-radius: 4px;
                border: 1px solid var(--border-color);
                background: rgba(13, 17, 23, 0.8);
                color: var(--text-primary);
              "
            />
            <select
              id="sortEvents"
              class="filter-input"
              style="
                padding: 0.5rem;
                border-radius: 4px;
                border: 1px solid var(--border-color);
                background: rgba(13, 17, 23, 0.8);
                color: var(--text-primary);
              "
            >
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="amount-high">Amount (High to Low)</option>
              <option value="amount-low">Amount (Low to High)</option>
            </select>
            <button type="button" id="refreshBtn" class="btn secondary-btn">
              Refresh
            </button>
          </div>
        </div>
        <div id="eventsContainer" class="events-grid">
          <div class="loading-spinner hidden"></div>
        </div>
      </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>
    <script src="/assets/app.js"></script>
  </body>
</html>
